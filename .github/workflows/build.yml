name: Build and commit dist

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    # Prevent infinite loop: skip if this commit was made by the Actions bot
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "chore: build dist"
          git push

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "CI失敗: Build and commit dist (${{ github.sha }})" \
            --body "## CI失敗通知
          ワークフロー **Build and commit dist** が失敗しました。
          - コミット: ${{ github.sha }}
          - ブランチ: ${{ github.ref_name }}
          - 実行URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"