name: Sync Vendored Libraries

on:
  schedule:
    # 日本時間 09:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and update chord2mml
        id: chord2mml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          UPSTREAM_REPO="cat2151/chord2mml"
          UPSTREAM_FILE="dist/chord2mml.mjs"
          LOCAL_FILE="src/chord2mml.mjs"
          HEADER_LINES=12  # 11コメント行 + 1空行（セパレータ）= アップストリームコンテンツ開始前まで

          # ローカルファイルのヘッダーから記録済みSHAを取得
          RECORDED_SHA=$(grep '// Upstream-SHA:' "$LOCAL_FILE" | awk '{print $3}')
          if ! [[ "$RECORDED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: RECORDED_SHA が不正です: '$RECORDED_SHA'" >&2
            exit 1
          fi

          # GitHubAPIで現在のアップストリームファイルのblobSHAを取得
          CURRENT_SHA=$(gh api "repos/$UPSTREAM_REPO/contents/$UPSTREAM_FILE" --jq '.sha')
          if ! [[ "$CURRENT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: CURRENT_SHA が不正です (APIエラーの可能性): '$CURRENT_SHA'" >&2
            exit 1
          fi

          echo "chord2mml: recorded=$RECORDED_SHA current=$CURRENT_SHA"
          if [ "$RECORDED_SHA" = "$CURRENT_SHA" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # アップストリームのファイル内容をダウンロード
          gh api "repos/$UPSTREAM_REPO/contents/$UPSTREAM_FILE" --jq '.content' \
            | tr -d '\n' | base64 -d > /tmp/upstream_content.mjs

          # ヘッダー（SHA更新済み）+ アップストリームコンテンツでファイルを再構築
          {
            head -n $HEADER_LINES "$LOCAL_FILE" \
              | sed "s|^// Upstream-SHA:.*|// Upstream-SHA: $CURRENT_SHA|"
            cat /tmp/upstream_content.mjs
          } > /tmp/new_file.mjs
          mv /tmp/new_file.mjs "$LOCAL_FILE"

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "recorded_sha=$RECORDED_SHA" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          echo "chord2mml を $RECORDED_SHA -> $CURRENT_SHA に更新しました"

      - name: Check and update mml2abc
        id: mml2abc
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          UPSTREAM_REPO="cat2151/obsidian-plugin-mmlabc"
          UPSTREAM_FILE="mml/mml2abc.mjs"
          LOCAL_FILE="src/mml2abc.mjs"
          HEADER_LINES=9  # 9コメント行（ライセンス・出典・SHA等） = アップストリームコンテンツ開始前まで

          # ローカルファイルのヘッダーから記録済みSHAを取得
          RECORDED_SHA=$(grep '// Upstream-SHA:' "$LOCAL_FILE" | awk '{print $3}')
          if ! [[ "$RECORDED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: RECORDED_SHA が不正です: '$RECORDED_SHA'" >&2
            exit 1
          fi

          # GitHubAPIで現在のアップストリームファイルのblobSHAを取得
          CURRENT_SHA=$(gh api "repos/$UPSTREAM_REPO/contents/$UPSTREAM_FILE" --jq '.sha')
          if ! [[ "$CURRENT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: CURRENT_SHA が不正です (APIエラーの可能性): '$CURRENT_SHA'" >&2
            exit 1
          fi

          echo "mml2abc: recorded=$RECORDED_SHA current=$CURRENT_SHA"
          if [ "$RECORDED_SHA" = "$CURRENT_SHA" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # アップストリームのファイル内容をダウンロード
          gh api "repos/$UPSTREAM_REPO/contents/$UPSTREAM_FILE" --jq '.content' \
            | tr -d '\n' | base64 -d > /tmp/upstream_content.mjs

          # ヘッダー（SHA更新済み）+ アップストリームコンテンツでファイルを再構築
          {
            head -n $HEADER_LINES "$LOCAL_FILE" \
              | sed "s|^// Upstream-SHA:.*|// Upstream-SHA: $CURRENT_SHA|"
            cat /tmp/upstream_content.mjs
          } > /tmp/new_file.mjs
          mv /tmp/new_file.mjs "$LOCAL_FILE"

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "recorded_sha=$RECORDED_SHA" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          echo "mml2abc を $RECORDED_SHA -> $CURRENT_SHA に更新しました"

      - name: Setup Bun
        if: steps.chord2mml.outputs.updated == 'true' || steps.mml2abc.outputs.updated == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Build and push
        if: steps.chord2mml.outputs.updated == 'true' || steps.mml2abc.outputs.updated == 'true'
        env:
          CHORD2MML_UPDATED: ${{ steps.chord2mml.outputs.updated }}
          CHORD2MML_OLD_SHA: ${{ steps.chord2mml.outputs.recorded_sha }}
          CHORD2MML_NEW_SHA: ${{ steps.chord2mml.outputs.current_sha }}
          MML2ABC_UPDATED: ${{ steps.mml2abc.outputs.updated }}
          MML2ABC_OLD_SHA: ${{ steps.mml2abc.outputs.recorded_sha }}
          MML2ABC_NEW_SHA: ${{ steps.mml2abc.outputs.current_sha }}
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ dist/

          COMMIT_MSG="chore: update vendored libraries from upstream"
          [ "$CHORD2MML_UPDATED" = "true" ] && COMMIT_MSG="$COMMIT_MSG
- chord2mml: ${CHORD2MML_OLD_SHA} -> ${CHORD2MML_NEW_SHA}"
          [ "$MML2ABC_UPDATED" = "true" ] && COMMIT_MSG="$COMMIT_MSG
- mml2abc: ${MML2ABC_OLD_SHA} -> ${MML2ABC_NEW_SHA}"

          git diff --cached --quiet || git commit -m "$COMMIT_MSG"
          git push
